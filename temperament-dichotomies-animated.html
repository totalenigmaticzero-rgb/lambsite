<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Temperament Dichotomies & Their Structural Significance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e4e4e7; font-family: 'Inter', -apple-system, sans-serif; }
  button { font-family: inherit; }
  table { border-spacing: 0; }
  ::-webkit-scrollbar { height: 6px; }
  ::-webkit-scrollbar-track { background: #12121a; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

  /* ── Pop-in: subtle scale + fade, no bounce ── */
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.97) translateY(6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);   }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes barGrow {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @keyframes dividerExpand {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }
  @keyframes orbPulse {
    0%, 100% { opacity: 0.04; transform: scale(1); }
    50%       { opacity: 0.07; transform: scale(1.1); }
  }
  @keyframes dotFade {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 0.7; transform: scale(1); }
  }

  /* Core pop-in class */
  .pop-in { animation: popIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) both; }

  /* Section wrapper — same pop-in, slightly faster */
  .section-enter { animation: popIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both; }

  /* Stagger delays — tight, professional */
  .stagger-1 { animation-delay: 0.04s; }
  .stagger-2 { animation-delay: 0.09s; }
  .stagger-3 { animation-delay: 0.14s; }
  .stagger-4 { animation-delay: 0.19s; }
  .stagger-5 { animation-delay: 0.24s; }
  .stagger-6 { animation-delay: 0.29s; }
  .stagger-7 { animation-delay: 0.34s; }
  .stagger-8 { animation-delay: 0.39s; }

  /* Hover — gentle lift only */
  .hover-lift {
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .hover-lift:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .pole-card-hover {
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .pole-card-hover:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  .tab-btn-anim {
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
  }
  .tab-btn-anim:active { opacity: 0.75; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Animated section wrapper — re-triggers animation when section changes
const SectionWrapper = ({ children, animKey }) => (
  <div key={animKey} className="section-enter">{children}</div>
);

const C = {
  bg: "#0a0a0f", card: "#12121a", cardHover: "#1a1a25", border: "#2a2a3a",
  accent1: "#f59e0b", accent2: "#06b6d4", accent3: "#8b5cf6", accent4: "#ef4444",
  text: "#e4e4e7", textMuted: "#9ca3af", textDim: "#6b7280",
  extravert: "#f59e0b", introvert: "#6366f1", static_: "#ef4444", dynamic_: "#06b6d4",
  rational: "#10b981", irrational: "#f97316",
  ep: "#f59e0b", ij: "#6366f1", ej: "#10b981", ip: "#06b6d4",
  rose: "#ec4899", teal: "#14b8a6", lime: "#84cc16", amber: "#d97706",
};

const Divider = ({ label, color }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 16, margin: "48px 0 28px" }}>
    <div style={{ flex: 1, height: 1, background: `linear-gradient(to right, transparent, ${color}40)`, animation: "dividerExpand 0.7s ease both", transformOrigin: "left" }} />
    <span style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 11, letterSpacing: 4, textTransform: "uppercase", color, fontWeight: 600, animation: "fadeIn 0.6s ease 0.2s both" }}>{label}</span>
    <div style={{ flex: 1, height: 1, background: `linear-gradient(to left, transparent, ${color}40)`, animation: "dividerExpand 0.7s ease 0.1s both", transformOrigin: "right" }} />
  </div>
);

const Card = ({ children, color = C.border, style = {}, animClass = "" }) => (
  <div className={`hover-lift ${animClass}`} style={{ background: C.card, border: `1px solid ${color}30`, borderRadius: 14, padding: 24, marginBottom: 8, cursor: "default", ...style }}>{children}</div>
);

const Tag = ({ label, color }) => (
  <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 10, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase", background: `${color}15`, color, border: `1px solid ${color}30`, fontFamily: "'JetBrains Mono', monospace" }}>{label}</span>
);

const Prose = ({ children, style = {} }) => (
  <p style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.7, margin: "0 0 16px", ...style }}>{children}</p>
);

const SmallProse = ({ children, style = {} }) => (
  <p style={{ fontSize: 12, color: C.textDim, lineHeight: 1.65, margin: 0, ...style }}>{children}</p>
);

const SectionTitle = ({ children, color = C.text }) => (
  <h3 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 18, color, margin: "0 0 14px" }}>{children}</h3>
);

const Mono = ({ children, color = C.textDim }) => (
  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color }}>{children}</span>
);

const Bar = ({ label, value, color, max = 100, delay = 0 }) => (
  <div style={{ marginBottom: 10 }}>
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
      <span style={{ fontSize: 12, color: C.text, fontWeight: 500 }}>{label}</span>
      <Mono>{value}%</Mono>
    </div>
    <div style={{ height: 6, borderRadius: 3, background: C.border, overflow: "hidden" }}>
      <div style={{
        height: "100%", borderRadius: 3,
        background: `linear-gradient(90deg, ${color}, ${color}99)`,
        animation: `barGrow 0.9s cubic-bezier(.22,.68,0,1.2) ${delay}s both`,
        transformOrigin: "left center",
        width: `${(value / max) * 100}%`,
      }} />
    </div>
  </div>
);

const PoleCard = ({ title, subtitle, color, items, icon, animClass = "" }) => (
  <div className={`pole-card-hover ${animClass}`} style={{ flex: 1, minWidth: 280, background: `linear-gradient(135deg, ${color}08, ${color}04)`, border: `1px solid ${color}25`, borderRadius: 12, padding: "24px 20px", position: "relative", overflow: "hidden" }}>
    <div style={{ position: "absolute", top: -30, right: -20, fontSize: 80, opacity: 0.04, fontWeight: 900, color, lineHeight: 1, animation: "orbPulse 4s ease-in-out infinite" }}>{icon}</div>
    <div style={{ fontSize: 18, fontWeight: 700, color, marginBottom: 4, fontFamily: "'Playfair Display', Georgia, serif" }}>{title}</div>
    <div style={{ fontSize: 11, color: C.textDim, letterSpacing: 2, textTransform: "uppercase", marginBottom: 16, fontFamily: "'JetBrains Mono', monospace" }}>{subtitle}</div>
    {items.map((item, i) => (
      <div key={i} style={{ fontSize: 13, color: C.text, lineHeight: 1.65, marginBottom: 8, paddingLeft: 14, position: "relative", animation: `popIn 0.32s cubic-bezier(0.22,1,0.36,1) ${0.08 + i * 0.05}s both` }}>
        <span style={{ position: "absolute", left: 0, top: 6, width: 5, height: 5, borderRadius: "50%", background: color, opacity: 0.7, animation: `dotFade 0.3s ease ${0.1 + i * 0.05}s both` }} />
        {item}
      </div>
    ))}
  </div>
);

const TempCard = ({ name, code, types, color, desc, traits, animClass = "" }) => (
  <div className={`hover-lift ${animClass}`} style={{ background: `linear-gradient(145deg, ${color}0a, ${C.card})`, border: `1px solid ${color}30`, borderRadius: 14, padding: 20, flex: "1 1 220px", minWidth: 220, cursor: "default" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
      <div style={{ width: 36, height: 36, borderRadius: 8, background: `${color}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, color, fontFamily: "'JetBrains Mono', monospace", transition: "transform 0.3s ease, background 0.3s ease" }}>{code}</div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 700, color }}>{name}</div>
        <div style={{ fontSize: 10, color: C.textDim, letterSpacing: 1.5, textTransform: "uppercase" }}>{types}</div>
      </div>
    </div>
    <p style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.6, margin: "0 0 10px" }}>{desc}</p>
    <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
      {traits.map((t, i) => (
        <span key={i} style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, background: `${color}10`, color: `${color}cc`, border: `1px solid ${color}20`, animation: `popIn 0.32s cubic-bezier(0.22,1,0.36,1) ${0.08 + i * 0.05}s both` }}>{t}</span>
      ))}
    </div>
  </div>
);

const TabBtn = ({ label, active, onClick, color }) => (
  <button className="tab-btn-anim" onClick={onClick} style={{ padding: "8px 18px", borderRadius: 8, border: active ? `1px solid ${color}50` : `1px solid ${C.border}`, background: active ? `${color}15` : "transparent", color: active ? color : C.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", letterSpacing: 0.5, fontFamily: "'JetBrains Mono', monospace" }}>{label}</button>
);

const LensCard = ({ lens, color, content }) => (
  <div className="hover-lift" style={{ background: `${color}06`, border: `1px solid ${color}18`, borderRadius: 10, padding: "16px 14px", transition: "border-color 0.25s ease", cursor: "default" }}>
    <div style={{ fontSize: 11, fontWeight: 700, color, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, fontFamily: "'JetBrains Mono', monospace" }}>{lens}</div>
    <SmallProse style={{ color: C.textMuted }}>{content}</SmallProse>
  </div>
);

const EFRadial = ({ name, code, color, wm, ic, cf }) => {
  const r = 32, cx = 50, cy = 50;
  const angles = [-90, 150, 30];
  const vals = [wm, ic, cf];
  const points = vals.map((v, i) => {
    const a = (angles[i] * Math.PI) / 180;
    const dist = (v / 100) * r;
    return `${cx + dist * Math.cos(a)},${cy + dist * Math.sin(a)}`;
  }).join(" ");
  return (
    <div style={{ textAlign: "center", flex: "1 1 140px", minWidth: 140 }}>
      <svg viewBox="0 0 100 100" width="120" height="120">
        {[25, 50, 75, 100].map(pct => (
          <circle key={pct} cx={cx} cy={cy} r={(pct / 100) * r} fill="none" stroke={C.border} strokeWidth={0.5} />
        ))}
        {angles.map((a, i) => {
          const rad = (a * Math.PI) / 180;
          return <line key={i} x1={cx} y1={cy} x2={cx + r * Math.cos(rad)} y2={cy + r * Math.sin(rad)} stroke={C.border} strokeWidth={0.4} />;
        })}
        <polygon points={points} fill={`${color}25`} stroke={color} strokeWidth={1.5} />
        {vals.map((v, i) => {
          const rad = (angles[i] * Math.PI) / 180;
          const dist = (v / 100) * r;
          return <circle key={i} cx={cx + dist * Math.cos(rad)} cy={cy + dist * Math.sin(rad)} r={2.5} fill={color} />;
        })}
        <text x={cx} y={cy - r - 5} textAnchor="middle" fontSize="5" fill={C.textDim}>WM</text>
        <text x={cx - r - 3} y={cy + r * 0.6 + 4} textAnchor="middle" fontSize="5" fill={C.textDim}>IC</text>
        <text x={cx + r + 3} y={cy + r * 0.6 + 4} textAnchor="middle" fontSize="5" fill={C.textDim}>CF</text>
      </svg>
      <div style={{ fontSize: 14, fontWeight: 700, color, fontFamily: "'JetBrains Mono', monospace" }}>{code}</div>
      <div style={{ fontSize: 10, color: C.textDim }}>{name}</div>
    </div>
  );
};

function TemperamentReport() {
  const [activeTab, setActiveTab] = useState("ei");
  const [activeSection, setActiveSection] = useState("core");
  const [animKey, setAnimKey] = useState(0);

  const changeSection = (id) => {
    setActiveSection(id);
    setAnimKey(k => k + 1);
  };

  const sections = [
    { id: "core", label: "Core Theory", color: C.accent1 },
    { id: "exec", label: "Executive Function", color: C.accent3 },
    { id: "onto", label: "Foundations", color: C.teal },
    { id: "struct", label: "Structural", color: C.accent4 },
    { id: "systems", label: "Cross-System", color: C.rose },
    { id: "anti", label: "Anti-Temperament", color: C.lime },
  ];

  const tabs = {
    ei: {
      label: "E / I", color: C.accent1, title: "Extraversion — Introversion", code: "x",
      dispersion: "17–20",
      mathNote: 'Coded as "x" in Reinin algebra. The single highest-variance dichotomy in Talanov\'s factor analyses, contributing 17–20% of total trait dispersion across the population (>90% for the most pronounced individual subjects).',
      structNote: "In Vincent's framework, E/I is determined by the Bold/Cautious function dichotomy — if Bold functions are Extroverted, then Cautious functions are Introverted. This dichotomy partitions Skew Blocks into Extravert vs Introvert pairs in the Presence Cube.",
      poles: [
        { title: "Extraversion", subtitle: "Energy excess · Hyperthymia", color: C.extravert, icon: "E",
          items: [
            "Predominance of excitation in higher nervous activity — higher baseline arousal and reward-sensitivity",
            "Initiative-taking, risk-seeking, sociable — actively engages with the environment",
            "Favors quantity in work output; oriented toward breadth of social contact and action radius",
            "Energizing information elements (Ne, Se, Fe, Te) occupy Bold function positions",
            "Behaviorally: louder voice, faster speech tempo, wider personal space utilization",
            "Talanov correlates: linked to hyperthymia and manic accentuation; inversely correlated with dysthymia",
          ],
        },
        { title: "Introversion", subtitle: "Energy deficit · Dysthymia", color: C.introvert, icon: "I",
          items: [
            "Predominance of inhibition in higher nervous activity — lower baseline arousal, more internal processing",
            "Waits for others' initiative, risk-averse, prefers seclusion — conserves resources through withdrawal",
            "Favors quality over quantity; deeper but narrower engagement across fewer domains",
            "Integrating information elements (Ni, Si, Fi, Ti) occupy Bold function positions",
            "Behaviorally: quieter speech, longer response latency, smaller social networks",
            "Talanov correlates: linked to dysthymia and depressive tendencies; inversely correlated with hyperthymia",
          ],
        },
      ],
    },
    sd: {
      label: "St / Dy", color: C.accent4, title: "Static — Dynamic", code: "abc",
      dispersion: "3–5",
      mathNote: 'Coded as "abc" — the product of all three Jungian function dichotomies. Despite being a tertiary product, its semantic payload is coherent. Contributes 3–5% population-average dispersion (~15% subject max), ranking 8th of 15 Reinin dichotomies.',
      structNote: "In Model A, Static/Dynamic determines the Mental ring composition: if a Mental function is Static, all Mental functions are Static and all Vital functions are Dynamic. In the Presence Cube, it partitions information blocks.",
      poles: [
        { title: "Static", subtitle: "Will · Rigidity · Principles", color: C.static_, icon: "St",
          items: [
            "Perception of reality as discrete potentials and distances — snapshot cognition",
            "Volitional adherence to principles; self-sufficient stance — 'one person can be enough'",
            "Processes signals digitally: categorical, black/white, boundary-aware perception",
            "Exists subjectively outside the flow of time — sees states rather than transitions",
            "Behaviorally: firmer stances in debate, less social fluidity, angular decision-making",
            "Cybernetically: holding-pattern regulator, maintaining set-points against perturbation",
          ],
        },
        { title: "Dynamic", subtitle: "Adaptation · Pliability · Needs", color: C.dynamic_, icon: "Dy",
          items: [
            "Perception of reality as flows and resource streams — process-oriented cognition",
            "Adapts to another's will; follows shifting needs rather than fixed principles",
            "Processes signals analogically: gradient, continuous, contextually-embedded perception",
            "Exists subjectively inside the flow of time — experiences transitions and trajectories",
            "Behaviorally: smoother pivots, greater social adaptability, more fluid movement patterns",
            "Cybernetically: flow-regulator, adjusting throughput to match environmental demands",
          ],
        },
      ],
    },
    pj: {
      label: "P / J", color: C.accent3, title: "Irrational — Rational", code: "abcx",
      dispersion: "10–12",
      mathNote: 'Coded as "abcx" — the product of all four basis dichotomies, the maximal composite. Contributes 10–12% population-average dispersion (~65% subject max). Talanov emphasizes this dichotomy is deeply tied to frontal lobe executive functioning.',
      structNote: "In Model A, Rationality/Irrationality determines which elements can be blocked together: a Rational element can only be blocked with an Irrational element. In the Conjunct Plane, shared between Reinin and Tencer spaces.",
      poles: [
        { title: "Irrationality", subtitle: "Spontaneity · Perception · Impulse", color: C.irrational, icon: "P",
          items: [
            "Deficit of frontal neocortical activity — reduced executive inhibition, more spontaneous action",
            "Perception-first processing: gathers data before judging; improvisation over planning",
            "Oriented toward vital needs — free time, pleasure, sensory experience prioritized",
            "Talanov: correlated with impulsivity, openness, lower conscientiousness",
            "Behaviorally: variable schedules, reactive routines, comfort with ambiguity",
            "Phenomenologically: experience feels open-ended, possibility-saturated",
          ],
        },
        { title: "Rationality", subtitle: "Control · Judgment · Planning", color: C.rational, icon: "J",
          items: [
            "Higher frontal lobe activity — stronger executive control, planning, self-regulation",
            "Judgment-first processing: evaluates and structures before perceiving",
            "Oriented toward social needs — belonging, collaborative activity, structured engagement",
            "Talanov: extreme form correlates with anankastic (obsessive-compulsive) features",
            "Behaviorally: regular schedules, proactive planning, discomfort with unstructured situations",
            "Phenomenologically: experience feels bounded, organized, temporally disciplined",
          ],
        },
      ],
    },
  };

  const current = tabs[activeTab];

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, sans-serif", background: C.bg, color: C.text, minHeight: "100vh", padding: "0 0 60px" }}>
      {/* HERO */}
      <div style={{ background: `radial-gradient(ellipse at 30% 0%, ${C.accent1}08, transparent 60%), radial-gradient(ellipse at 70% 100%, ${C.accent3}06, transparent 50%)`, padding: "48px 28px 36px", borderBottom: `1px solid ${C.border}`, textAlign: "center", position: "relative", overflow: "hidden" }}>
        {/* Animated orbs */}
        <div style={{ position: "absolute", top: -60, left: -60, width: 200, height: 200, borderRadius: "50%", background: `${C.accent1}06`, animation: "orbPulse 5s ease-in-out infinite", pointerEvents: "none" }} />
        <div style={{ position: "absolute", bottom: -40, right: -40, width: 160, height: 160, borderRadius: "50%", background: `${C.accent3}05`, animation: "orbPulse 6s ease-in-out 1s infinite", pointerEvents: "none" }} />
        <Mono color={C.accent2}><span style={{ animation: "fadeIn 0.6s ease both" }}>Socionics · Talanov / Romanov / Gulenko / Vincent Paradigms</span></Mono>
        <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: "clamp(26px, 5vw, 40px)", fontWeight: 700, lineHeight: 1.15, margin: "14px 0", background: `linear-gradient(135deg, ${C.text}, ${C.textMuted})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", animation: "popIn 0.45s cubic-bezier(0.22,1,0.36,1) 0.1s both" }}>
          Temperament Dichotomies & Their Structural Significance
        </h1>
        <Prose style={{ maxWidth: 660, margin: "0 auto 18px", textAlign: "center", animation: "popIn 0.4s cubic-bezier(0.22,1,0.36,1) 0.18s both" }}>
          A comprehensive analysis of E/I, Static/Dynamic, and Rational/Irrational — the three dichotomies generating the four Socionics temperaments — explored through executive function, ontological foundations, structural connections to the broader Socion, and cross-system correspondences.
        </Prose>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
          {["Executive Function", "Ontological", "Structural", "Cross-System", "Anti-Temperament"].map((l, i) => (
            <span key={i} style={{ display: "inline-block", animation: `popIn 0.38s cubic-bezier(0.22,1,0.36,1) ${0.28 + i * 0.06}s both` }}>
              <Tag label={l} color={[C.accent3, C.teal, C.accent4, C.rose, C.lime][i]} />
            </span>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 920, margin: "0 auto", padding: "0 20px" }}>
        {/* SECTION NAV */}
        <div style={{ display: "flex", gap: 6, marginTop: 28, flexWrap: "wrap", justifyContent: "center" }}>
          {sections.map((s, i) => (
            <span key={s.id} className={`pop-in stagger-${i+1}`} style={{ display: "inline-block" }}>
              <TabBtn label={s.label} active={activeSection === s.id} onClick={() => changeSection(s.id)} color={s.color} />
            </span>
          ))}
        </div>

        {/* CORE THEORY */}
        {activeSection === "core" && <SectionWrapper animKey={`core-${animKey}`}><>
          <Divider label="Scope & Variance Contribution" color={C.accent2} />
          <Card animClass="pop-in">
            <Prose>
              Talanov's large-scale questionnaire analyses reveal that not all 15 Reinin dichotomies contribute equally to the variance of personality traits. The three "temperament" dichotomies occupy very different positions in this hierarchy — E/I dominates, while Static/Dynamic has modest variance despite its deep structural role.
            </Prose>
            <Bar label="Extraversion / Introversion (x)" value={18.5} color={C.extravert} delay={0.1} />
            <Bar label="Rational / Irrational (abcx)" value={11} color={C.accent3} delay={0.25} />
            <Bar label="Static / Dynamic (abc)" value={4} color={C.static_} delay={0.4} />
            <SmallProse style={{ marginTop: 12 }}>
              Variance values represent approximate population-average trait dispersion percentages from Talanov's factor analyses. E/I alone accounts for more than the other two combined — a psychometric asymmetry reflecting its deep ties to cortical excitation/inhibition balance.
            </SmallProse>
          </Card>

          <Divider label="Dichotomy Deep Dives" color={current.color} />
          <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
            {Object.entries(tabs).map(([k, t]) => (
              <TabBtn key={k} label={t.label} active={activeTab === k} onClick={() => setActiveTab(k)} color={t.color} />
            ))}
          </div>

          <Card color={current.color}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <div style={{ width: 44, height: 44, borderRadius: 10, background: `${current.color}18`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontSize: 16, fontWeight: 800, color: current.color, fontFamily: "'JetBrains Mono', monospace" }}>{current.code}</span>
              </div>
              <div>
                <h2 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 22, color: current.color, margin: 0 }}>{current.title}</h2>
                <Mono>Dispersion: {current.dispersion}% pop. avg.</Mono>

                    ["DCNH (Gulenko)", "Creative (C)", "Normalizing (N)", "Dominant (D)", "Harmonizing (H)", "Group role observation"],
                    ["Helen Fisher", "Explorer (Dopamine)", "Builder (Serotonin)", "Director (Testosterone)", "Negotiator (Estrogen)", "Neurochemistry"],
                    ["DiSC", "Influence (I)", "Conscientiousness (C)", "Dominance (D)", "Steadiness (S)", "Behavioral assessment"],
                    ["PAEI (Adizes)", "Entrepreneur (E)", "Administrator (A)", "Producer (P)", "Integrator (I)", "Management roles"],
                    ["CPI Vector", "Vector 3 (Flexibility)", "Vector 1 (Norm-favoring)", "Vector 2 (Self-realization)", "Vector 4 (Sensitivity)", "California Personality Inventory"],
                    ["Hippocrates", "Sanguine", "Melancholic", "Choleric", "Phlegmatic", "Classical humoral theory"],
                    ["Goal Orientation", "Mastery-Approach", "Performance-Avoidance", "Performance-Approach", "Mastery-Avoidance", "Achievement motivation"],
                  ].map((row, i) => (
                    <tr key={i}>
                      {row.map((cell, j) => (
                        <td key={j} style={{
                          padding: "8px 8px",
                          borderBottom: `1px solid ${C.border}20`,
                          color: j === 0 ? C.text : j === 1 ? C.ep : j === 2 ? C.ij : j === 3 ? C.ej : j === 4 ? C.ip : C.textDim,
                          fontWeight: j === 0 ? 600 : 400,
                          fontFamily: j === 0 ? "inherit" : "'JetBrains Mono', monospace",
                          fontSize: j === 0 ? 12 : 10,
                          whiteSpace: "nowrap",
                        }}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>

          <Card>
            <SectionTitle color={C.rose}>DCNH: Temperament as Subtype</SectionTitle>
            <Prose>
              Gulenko's DCNH system is the most direct Socionics-internal mapping of temperament to subtype. Each DCNH subtype strengthens the function pair corresponding to one temperament group: Dominant strengthens Te+Fe (EJ-pattern), Creative strengthens Se+Ne (EP-pattern), Normalizing strengthens Ti+Fi (IJ-pattern), Harmonizing strengthens Si+Ni (IP-pattern). This means every individual operates with their type's temperament <em>modulated</em> by a subtype that may reinforce or cross-cut it.
            </Prose>
            <Prose>
              The DCNH benefit ring (D→C→N→H→D) mirrors the temperament interaction dynamics: Dominant activates Creative (EJ energizes EP), Creative stimulates Normalizing (EP provokes IJ), Normalizing grounds Harmonizing (IJ steadies IP), and Harmonizing paradoxically re-energizes Dominant (IP's subtle manipulation re-engages EJ). The DCNH supervision ring runs opposite, creating a complete energetic circulation at the subtype level.
            </Prose>
          </Card>

          <Card>
            <SectionTitle color={C.rose}>Helen Fisher: Neurochemical Convergence</SectionTitle>
            <Prose>
              Fisher's identification of four temperament types from neurochemistry — entirely independent of Socionics — provides powerful biological validation. The mapping is not arbitrary: Explorer (dopamine) shares EP's core traits of novelty-seeking, risk-taking, spontaneity, and mental flexibility. Builder (serotonin) shares IJ's conscientiousness, rule-following, caution, and stability. Director (testosterone) shares EJ's decisiveness, goal-orientation, and systematic drive. Negotiator (estrogen/oxytocin) shares IP's empathy, contextual thinking, and adaptive sensitivity.
            </Prose>
            <Prose>
              The correspondence extends to mate-selection patterns: Fisher found that Explorers prefer Explorers and Builders prefer Builders (like-attracts-like), while Directors and Negotiators prefer each other (opposites-attract). In Socionics terms, this maps to the observation that EP-EP and IJ-IJ pairs share the same static processing mode, while EJ-IP duality pairs are the prototypical complementary dynamic configuration.
            </Prose>
          </Card>

          <Card>
            <SectionTitle color={C.rose}>Torus & Presence Cube: Geometric Representation</SectionTitle>
            <Prose>
              On the Socionics Torus (as visualized in the Observable notebook), the 16 types are arranged on a toroidal surface where the two fundamental cycles correspond to the two independent temperament dichotomies. Temperament groups form bands running around the torus: EP and IJ types (the two <em>static</em> temperaments) occupy antipodal positions on one cycle, while EJ and IP types (the two <em>dynamic</em> temperaments) occupy antipodal positions on the other. Intertype relations emerge naturally from topological proximity — duals are adjacent, conflictors are antipodal within their quadra's toroidal region.
            </Prose>
            <Prose style={{ marginBottom: 0 }}>
              In the Presence Cube, the three temperament dichotomies define the axes of the cube's three-dimensional space for information elements. E/I partitions Skew Blocks (extraverted elements on one face, introverted on the opposite). St/Dy partitions the Mental and Vital rings (all elements in a ring share static/dynamic). P/J partitions blocking rules (only rational+irrational pairs can form functional blocks). The cube thus encodes temperament as the <em>geometry of information space itself</em> — not a behavioral overlay but the coordinate system within which all information metabolism occurs.
            </Prose>
          </Card>
        </></SectionWrapper>}

        {/* ANTI-TEMPERAMENT */}
        {activeSection === "anti" && <SectionWrapper animKey={`anti-${animKey}`}><>
          <Divider label="Anti-Temperaments: A Theoretical Exploration" color={C.lime} />
          <Card>
            <SectionTitle color={C.lime}>Can Anti-Temperaments Exist?</SectionTitle>
            <Prose>
              Talanov theorizes anti-quadras: groups that share subdued (non-valued) elements, creating a kind of "shadow" societal dynamic. By analogy, could anti-temperaments exist — inversions of one's natural energy metabolism that emerge under specific conditions?
            </Prose>
            <Prose>
              The answer is structurally nuanced. In Talanov's anti-quadra framework, the anti-quadra for Alpha is Gamma (and vice versa), and the anti-quadra for Beta is Delta (and vice versa). These are determined by the quadra-value dichotomies. For temperaments, the analogous inversion would flip the temperament dichotomies, producing diagonal oppositions: EP↔IJ and EJ↔IP. These are already recognized in Socionics as the maximally distant temperament pairs — they share <em>no</em> temperament dichotomy values.
            </Prose>
          </Card>

          <Card>
            <SectionTitle color={C.lime}>Three Possible Anti-Temperament Mechanisms</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: 14 }}>
              {[
                { name: "Shadow-Function Inversion", color: C.lime, icon: "①", content: "In Model A, the Vital ring has the opposite Static/Dynamic value from the Mental ring, but shares E/I and P/J. This means the 'unconscious' processing operates at a different signal architecture (digital↔analog) while maintaining the same energy level and regulation style. This isn't a full anti-temperament (same temperament group) but represents a St/Dy inversion that may manifest under stress as a shift from principled to needs-driven behavior (or vice versa) — a partial anti-temperament." },
                { name: "DCNH 4th-Position Subtype", color: C.amber, icon: "②", content: "In Gulenko's expanded subtype theory, each person has a hierarchy of all four DCNH subtypes. The 4th-position subtype — the one used 'only as a last resort' — represents the anti-temperament in behavioral terms. For a naturally Dominant (EJ-pattern) person, the Harmonizing (IP-pattern) subtype is maximally distant and uncomfortable. Under extreme duress, individuals may collapse into this anti-temperament, exhibiting behavior that feels alien to themselves and others — the 'I don't even recognize myself' phenomenon." },
                { name: "Stress-Induced Flip", color: C.accent4, icon: "③", content: "Talanov's psychophysiological framework predicts that extreme stress can temporarily invert excitation/inhibition dynamics. An extravert under severe threat may exhibit inhibition-dominance (withdrawal, energy conservation). A rational type under chaos may show irrational emergency responses (impulsive, unplanned). This situational anti-temperament is temporary and metabolically costly — the system snaps back once the stressor resolves. It parallels the grip/loop phenomena described in MBTI developmental theory." },
              ].map((m, i) => (
                <div key={i} style={{ background: `${m.color}08`, border: `1px solid ${m.color}20`, borderRadius: 10, padding: 16 }}>
                  <div style={{ fontSize: 20, marginBottom: 6 }}>{m.icon}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: m.color, marginBottom: 8 }}>{m.name}</div>
                  <SmallProse style={{ color: C.textMuted }}>{m.content}</SmallProse>
                </div>
              ))}
            </div>
          </Card>

          <Card>
            <SectionTitle color={C.lime}>The Key Difference from Anti-Quadras</SectionTitle>
            <Prose>
              Anti-quadras exist as stable, persistent structures in the Socion — Gamma is always Alpha's anti-quadra, regardless of context. Anti-temperaments, by contrast, are more likely <em>states</em> than <em>traits</em>. Temperament, being grounded in psychophysiology (cortical excitation/inhibition balance, frontal lobe activity), is more biologically rigid than quadra values, which involve higher-order preference structures. You can change what you value more readily than you can change your nervous system's baseline excitation level.
            </Prose>
            <Prose>
              This means anti-temperaments are best understood not as permanent shadow structures but as temporary metabolic inversions — the system operating outside its optimal parameters. They are real, observable, and psychologically significant, but they are fundamentally unstable states that the organism works to exit. The closest stable analog would be the DCNH 4th-position subtype: a behavioral mode that is available but perpetually uncomfortable, representing the furthest extension of the personality's adaptive range.
            </Prose>
          </Card>

          <Card>
            <SectionTitle>Anti-Temperament Pairings</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[
                { a: "EP", an: "IJ", ac: C.ep, anc: C.ij, label: "Maximum Opposition I", desc: "Flexible-Turning vs Balanced-Stable. High-energy impulsive exploration vs. low-energy principled persistence. The EP's anti-temperament state looks like rigid, methodical withdrawal; the IJ's looks like reckless, unregulated expansiveness." },
                { a: "EJ", an: "IP", ac: C.ej, anc: C.ip, label: "Maximum Opposition II", desc: "Linear-Assertive vs Receptive-Adaptive. Sustained directed drive vs. passive environmental sensitivity. The EJ's anti-temperament state looks like formless passivity; the IP's looks like forceful, unyielding forward thrust." },
              ].map((pair, i) => (
                <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                    <span style={{ fontSize: 14, fontWeight: 800, color: pair.ac, fontFamily: "'JetBrains Mono', monospace" }}>{pair.a}</span>
                    <span style={{ fontSize: 12, color: C.textDim }}>↔</span>
                    <span style={{ fontSize: 14, fontWeight: 800, color: pair.anc, fontFamily: "'JetBrains Mono', monospace" }}>{pair.an}</span>
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.text, marginBottom: 6 }}>{pair.label}</div>
                  <SmallProse style={{ color: C.textMuted }}>{pair.desc}</SmallProse>
                </div>
              ))}
            </div>
          </Card>
        </></SectionWrapper>}

        {/* STRUCTURAL SIGNIFICANCE - always visible */}
        <Divider label="Structural Significance" color={C.accent3} />
        <Card>
          <SectionTitle>Why These Three — And Not Others?</SectionTitle>
          <Prose>
            The temperament dichotomies are not arbitrarily selected — they emerge from the algebraic structure of the Socion as the three dichotomies that specifically determine behavioral tempo, energy management, and information-processing rhythm.
          </Prose>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 2, background: C.border, borderRadius: 10, overflow: "hidden", marginBottom: 16 }}>
            {[
              { label: "Function Strength", desc: "a, b, c", color: C.accent1, sub: "What you can do" },
              { label: "Quadra Values", desc: "ac, bc, ab", color: C.accent4, sub: "What you want to do" },
              { label: "Temperament", desc: "x, abc, abcx", color: C.accent2, sub: "How you do it" },
            ].map((cell, i) => (
              <div key={i} style={{ background: C.card, padding: "16px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: cell.color, marginBottom: 4 }}>{cell.label}</div>
                <Mono>{cell.desc}</Mono>
                <div style={{ fontSize: 11, color: C.textMuted, fontStyle: "italic", marginTop: 6 }}>{cell.sub}</div>
              </div>
            ))}
          </div>
          <SmallProse>
            Understanding temperament is prerequisite to understanding everything else in Socionics — because temperament determines the <em>energetic substrate</em> on which all other structures (clubs, quadras, rings, intertype relations) operate. Clubs tell you what two people can talk about; quadras tell you what they value; but temperament tells you whether they'll be speaking at the same speed, with the same rhythm, and on the same wavelength. It is the carrier wave upon which all information metabolism signals are transmitted.
          </SmallProse>
        </Card>

        {/* FOOTER */}
        <div style={{ textAlign: "center", marginTop: 48, paddingTop: 24, borderTop: `1px solid ${C.border}` }}>
          <p style={{ fontSize: 10, color: C.textDim, letterSpacing: 1.5, fontFamily: "'JetBrains Mono', monospace" }}>
            SOURCES: Talanov VL questionnaire data · Romanov I (socionavigator.com) · Vincent V (Model A, Dichotomy Spaces, Presence Cube) · Gulenko VV (DCNH, SHS) · Fisher HE (FTI neurochemistry) · sociotype.xyz · Diamond A (2013) Executive Functions · Miyake et al. (2000)
          </p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<TemperamentReport />, document.getElementById('root'));
